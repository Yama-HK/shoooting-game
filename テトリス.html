<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>簡単なテトリス風ゲーム</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #0f172a, #111827);
      color: #fff;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }
    .wrap {
      width: min(100%, 460px);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .top {
      display: grid;
      grid-template-columns: 1fr 120px;
      gap: 12px;
      align-items: start;
    }
    canvas {
      width: 100%;
      max-width: 320px;
      aspect-ratio: 10 / 20;
      background: #020617;
      border: 3px solid #60a5fa;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      touch-action: none;
    }
    .side {
      background: rgba(15, 23, 42, 0.95);
      border: 2px solid rgba(96, 165, 250, 0.35);
      border-radius: 12px;
      padding: 12px;
      min-height: 100%;
    }
    .side h1 {
      margin: 0 0 10px;
      font-size: 18px;
    }
    .stat { margin: 8px 0; font-size: 15px; }
    .msg {
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.5;
      color: #dbeafe;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .btn {
      border: none;
      border-radius: 14px;
      background: #1e3a8a;
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      padding: 16px 0;
      box-shadow: 0 6px 14px rgba(0,0,0,0.25);
      touch-action: manipulation;
    }
    .btn:active {
      transform: scale(0.97);
      background: #2563eb;
    }
    .wide {
      grid-column: span 2;
    }
    .small {
      font-size: 16px;
      font-weight: 600;
    }
    @media (max-width: 430px) {
      .top {
        grid-template-columns: 1fr;
      }
      canvas {
        max-width: 100%;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <canvas id="game" width="300" height="600"></canvas>
      <div class="side">
        <h1>テトリス風</h1>
        <div class="stat" id="scoreText">SCORE: 0</div>
        <div class="stat" id="linesText">LINES: 0</div>
        <div class="stat" id="levelText">LEVEL: 1</div>
        <div class="msg">
          携帯操作対応。<br>
          ← → : 移動<br>
          ? : 回転<br>
          ↓ : 速く落とす<br>
          DROP : 一気に落とす<br>
          RESTART : やり直し
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="leftBtn">←</button>
      <button class="btn" id="rotateBtn">?</button>
      <button class="btn" id="rightBtn">→</button>
      <button class="btn" id="downBtn">↓</button>
      <button class="btn wide small" id="dropBtn">DROP</button>
      <button class="btn wide small" id="restartBtn">RESTART</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const COLS = 10;
    const ROWS = 20;
    const BLOCK = canvas.width / COLS;

    const scoreText = document.getElementById('scoreText');
    const linesText = document.getElementById('linesText');
    const levelText = document.getElementById('levelText');

    const colors = [
      null,
      '#60a5fa',
      '#f97316',
      '#22c55e',
      '#eab308',
      '#a78bfa',
      '#ef4444',
      '#14b8a6'
    ];

    const shapes = [
      [],
      [[1, 1, 1], [0, 1, 0]],
      [[2, 0, 0], [2, 2, 2]],
      [[0, 0, 3], [3, 3, 3]],
      [[4, 4], [4, 4]],
      [[0, 5, 5], [5, 5, 0]],
      [[6, 6, 0], [0, 6, 6]],
      [[7, 7, 7, 7]]
    ];

    let board;
    let piece;
    let dropCounter;
    let lastTime;
    let dropInterval;
    let score;
    let lines;
    let level;
    let gameOver;

    function createBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    }

    function randomPiece() {
      const type = 1 + Math.floor(Math.random() * (shapes.length - 1));
      const matrix = shapes[type].map(row => [...row]);
      return {
        matrix,
        x: Math.floor(COLS / 2) - Math.ceil(matrix[0].length / 2),
        y: 0
      };
    }

    function resetGame() {
      board = createBoard();
      score = 0;
      lines = 0;
      level = 1;
      dropInterval = 700;
      dropCounter = 0;
      lastTime = 0;
      gameOver = false;
      spawnPiece();
      updateUI();
    }

    function spawnPiece() {
      piece = randomPiece();
      piece.y = 0;
      if (collide(board, piece)) {
        gameOver = true;
      }
    }

    function collide(board, piece) {
      const m = piece.matrix;
      for (let y = 0; y < m.length; y++) {
        for (let x = 0; x < m[y].length; x++) {
          if (m[y][x] !== 0) {
            const bx = x + piece.x;
            const by = y + piece.y;
            if (bx < 0 || bx >= COLS || by >= ROWS) return true;
            if (by >= 0 && board[by][bx] !== 0) return true;
          }
        }
      }
      return false;
    }

    function merge(board, piece) {
      piece.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0 && piece.y + y >= 0) {
            board[piece.y + y][piece.x + x] = value;
          }
        });
      });
    }

    function rotate(matrix) {
      return matrix[0].map((_, i) => matrix.map(row => row[i]).reverse());
    }

    function playerMove(dir) {
      if (gameOver) return;
      piece.x += dir;
      if (collide(board, piece)) piece.x -= dir;
    }

    function playerRotate() {
      if (gameOver) return;
      const originalX = piece.x;
      const rotated = rotate(piece.matrix);
      piece.matrix = rotated;
      const kicks = [0, -1, 1, -2, 2];
      for (const offset of kicks) {
        piece.x = originalX + offset;
        if (!collide(board, piece)) return;
      }
      piece.x = originalX;
      for (let i = 0; i < 3; i++) {
        piece.matrix = rotate(piece.matrix);
      }
    }

    function playerDrop() {
      if (gameOver) return;
      piece.y++;
      if (collide(board, piece)) {
        piece.y--;
        merge(board, piece);
        clearLines();
        spawnPiece();
      }
      dropCounter = 0;
    }

    function hardDrop() {
      if (gameOver) return;
      while (!collide(board, piece)) {
        piece.y++;
      }
      piece.y--;
      merge(board, piece);
      clearLines();
      spawnPiece();
      dropCounter = 0;
    }

    function clearLines() {
      let cleared = 0;
      outer: for (let y = ROWS - 1; y >= 0; y--) {
        for (let x = 0; x < COLS; x++) {
          if (board[y][x] === 0) continue outer;
        }
        const row = board.splice(y, 1)[0].fill(0);
        board.unshift(row);
        cleared++;
        y++;
      }

      if (cleared > 0) {
        lines += cleared;
        score += [0, 100, 250, 450, 700][cleared] || 0;
        level = 1 + Math.floor(lines / 5);
        dropInterval = Math.max(160, 700 - (level - 1) * 60);
        updateUI();
      }
    }

    function drawCell(x, y, value) {
      ctx.fillStyle = colors[value];
      ctx.fillRect(x * BLOCK, y * BLOCK, BLOCK, BLOCK);
      ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      ctx.strokeRect(x * BLOCK, y * BLOCK, BLOCK, BLOCK);
    }

    function drawBoard() {
      ctx.fillStyle = '#020617';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          if (board[y][x] !== 0) drawCell(x, y, board[y][x]);
          else {
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.strokeRect(x * BLOCK, y * BLOCK, BLOCK, BLOCK);
          }
        }
      }
    }

    function drawPiece() {
      piece.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            drawCell(piece.x + x, piece.y + y, value);
          }
        });
      });
    }

    function drawGameOver() {
      if (!gameOver) return;
      ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.font = 'bold 34px system-ui, sans-serif';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 10);
      ctx.font = '18px system-ui, sans-serif';
      ctx.fillText('RESTARTでやり直し', canvas.width / 2, canvas.height / 2 + 26);
      ctx.textAlign = 'left';
    }

    function updateUI() {
      scoreText.textContent = `SCORE: ${score}`;
      linesText.textContent = `LINES: ${lines}`;
      levelText.textContent = `LEVEL: ${level}`;
    }

    function update(time = 0) {
      const deltaTime = time - lastTime;
      lastTime = time;
      if (!gameOver) {
        dropCounter += deltaTime;
        if (dropCounter > dropInterval) {
          playerDrop();
        }
      }

      drawBoard();
      drawPiece();
      drawGameOver();
      requestAnimationFrame(update);
    }

    document.addEventListener('keydown', (e) => {
      if (e.code === 'ArrowLeft') playerMove(-1);
      if (e.code === 'ArrowRight') playerMove(1);
      if (e.code === 'ArrowDown') playerDrop();
      if (e.code === 'ArrowUp' || e.code === 'Space') playerRotate();
      if (e.code === 'Enter') hardDrop();
      if (e.code === 'KeyR') resetGame();
    });

    function bindButton(id, onTap, onHold = null) {
      const el = document.getElementById(id);
      let timer = null;

      const start = (ev) => {
        ev.preventDefault();
        onTap();
        if (onHold) {
          timer = setInterval(onHold, 90);
        }
      };
      const end = () => {
        if (timer) {
          clearInterval(timer);
          timer = null;
        }
      };

      el.addEventListener('touchstart', start, { passive: false });
      el.addEventListener('mousedown', start);
      el.addEventListener('touchend', end);
      el.addEventListener('touchcancel', end);
      el.addEventListener('mouseup', end);
      el.addEventListener('mouseleave', end);
    }

    bindButton('leftBtn', () => playerMove(-1), () => playerMove(-1));
    bindButton('rightBtn', () => playerMove(1), () => playerMove(1));
    bindButton('rotateBtn', () => playerRotate());
    bindButton('downBtn', () => playerDrop(), () => playerDrop());
    bindButton('dropBtn', () => hardDrop());
    bindButton('restartBtn', () => resetGame());

    resetGame();
    update();
  </script>
</body>
</html>
